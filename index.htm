<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title id="site-title"></title>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/scale.css">

    <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js" defer></script>
    <script src="https://unpkg.com/@popperjs/core@2" defer></script>
    <script src="https://unpkg.com/tippy.js@6" defer></script>
</head>
<body>
    <div id="custom-context">
        <div class="ctx-item" onclick="location.reload()"><i class="fa-solid fa-rotate-right"></i> Refresh</div>
        <div class="ctx-item" onclick="window.scrollTo(0,0)"><i class="fa-solid fa-arrow-up"></i> Top</div>
    </div>

    <nav id="navbar">
        <div class="nav-left">
            <div class="nav-brand">
                <img id="nav-logo" src="" alt="">

            </div>
            <div class="nav-links" id="nav-links"></div>
        </div>
        <div class="nav-right">

        </div>
        <div id="mega-menu-overlay"></div>
    </nav>

    <div id="mobile-menu" class="mobile-menu-container">
        <div id="mobile-links"></div>
    </div>

    <main id="app" style="opacity:0;visibility:hidden;transform:translateY(20px)">
        <section id="hero">
            <div class="hero-bg" id="hero-bg"></div>
            <div class="hero-content">
                <h1 id="hero-title"></h1>
                <p id="hero-sub"></p>
            </div>
        </section>
        <div id="content-sections"></div>
    </main>

    <footer id="footer" style="opacity:0;visibility:hidden">
        <div class="footer-content">
            <div class="footer-links" id="footer-links"></div>
            <div class="footer-socials" id="footer-socials"></div>
            <div class="footer-copy" id="footer-copy"></div>
        </div>
    </footer>

    <script src="script.js" defer></script>
</body>
</html>
