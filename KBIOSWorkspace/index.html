<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>KBIOS Workspace</title><script src="https://cdn.tailwindcss.com"></script><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/vscode-dark.min.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script><style>body,html{margin:0;padding:0;height:100%;background:#f3f3f3;font-family:'Segoe UI',Roboto,Helvetica,sans-serif;overflow:hidden}::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#c1c1c1;border-radius:10px}::-webkit-scrollbar-thumb:hover{background:#a8a8a8}.no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}#tbar{position:fixed;top:0;left:0;height:3px;background:#0067c0;z-index:9999;width:0;transition:width .2s ease-out}.ms-btn{background:#0067c0;color:#fff;border:none;border-radius:4px;padding:6px 14px;font-size:13px;font-weight:600;transition:.1s;box-shadow:0 2px 4px rgba(0,0,0,.1);display:inline-flex;align-items:center;gap:6px;white-space:nowrap}.ms-btn:hover{background:#005a9e}.ms-btn-sec{background:#fff;color:#333;border:1px solid #d1d1d1;border-radius:4px;padding:6px 14px;font-size:13px;font-weight:600;transition:.1s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}.ms-btn-sec:hover{background:#f3f3f3}.ms-card{background:#fff;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid #e5e5e5;transition:.2s;position:relative}.ms-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-1px)}.CodeMirror{height:100%;font-size:14px;font-family:'Consolas',monospace}#drop-zone{position:fixed;inset:0;background:rgba(0,103,192,.1);border:4px dashed #0067c0;z-index:9998;display:none;justify-content:center;align-items:center;backdrop-filter:blur(2px)}.sim-desktop{width:1024px!important;height:768px!important;max-width:100%;max-height:100%;border-radius:8px}.sim-mobile{width:375px!important;height:812px!important;border-radius:40px!important;box-shadow:0 0 0 12px #0f172a,0 25px 50px -12px rgba(0,0,0,.5)!important}.sim-mobile.land{width:812px!important;height:375px!important}</style></head><body class="flex flex-col"><div id="tbar"></div><div id="drop-zone"><div class="text-4xl font-bold text-blue-700 bg-white p-8 rounded-lg shadow-xl"><i class="fa-solid fa-cloud-arrow-up mr-3"></i>Drop files or ZIP to import</div></div><header class="bg-white border-b border-gray-200 h-14 flex items-center px-4 justify-between shrink-0 z-20"><div class="flex items-center gap-3"><img src="KBIOSWeb.png" alt="KBIOS" class="h-8 w-8 object-contain rounded" onerror="this.src='https://img.icons8.com/fluency/48/circuit.png'"><h1 class="text-base font-bold text-gray-800 tracking-tight hidden sm:block">KBIOS <span class="text-xs font-normal text-gray-500 ml-1">Workspace</span></h1></div><div class="flex-1 max-w-md mx-4 relative hidden xs:block"><i class="fa-solid fa-search absolute left-3 top-2.5 text-gray-400 text-xs"></i><input type="text" id="sch" placeholder="Search workspace..." class="w-full bg-gray-100 border border-transparent rounded h-8 pl-9 pr-3 text-sm focus:bg-white focus:border-blue-500 focus:outline-none transition-all"></div><div class="flex items-center gap-2 overflow-x-auto no-scrollbar pb-1 sm:pb-0"><button id="v-tg" class="ms-btn-sec" title="Toggle View"><i class="fa-solid fa-table-cells-large"></i></button><button id="blk-del" class="ms-btn-sec text-red-600 hover:bg-red-50" title="Clear All"><i class="fa-solid fa-trash-can"></i></button><button id="exp-all" class="ms-btn-sec" title="Export ZIP"><i class="fa-solid fa-file-zipper"></i></button><label class="ms-btn cursor-pointer"><i class="fa-solid fa-circle-plus"></i><span class="hidden sm:inline">Add Files</span><input type="file" id="upf" multiple class="hidden"></label></div></header><div class="flex flex-1 overflow-hidden"><aside class="w-16 md:w-52 bg-gray-50 border-r border-gray-200 flex flex-col justify-between py-2 shrink-0 transition-all z-10"><div class="flex flex-col gap-1 px-2"><div class="text-[10px] font-bold text-gray-400 px-2 uppercase tracking-wider hidden md:block mb-1">Categories</div><nav class="flex flex-col gap-1" id="nav-cats"></nav></div><div class="px-3 py-2 border-t border-gray-200 hidden md:block"><div class="flex justify-between text-[10px] text-gray-500 mb-1"><span>Storage Quota</span><span id="quota-txt">0 MB</span></div><div class="w-full bg-gray-200 h-1.5 rounded-full overflow-hidden"><div id="quota-bar" class="bg-blue-600 h-full w-0 transition-all"></div></div></div></aside><main class="flex-1 overflow-y-auto p-4 md:p-6 bg-[#f9fbfd]" id="mc"><div id="empty-view" class="hidden flex-col items-center justify-center h-full text-center"><div class="w-32 h-32 bg-blue-50/50 rounded-full flex items-center justify-center mb-6 shadow-sm border border-blue-100"><i class="fa-solid fa-magnifying-glass-chart text-6xl text-blue-400"></i></div><h3 class="text-2xl font-bold text-gray-700 tracking-tight">No workspace files found</h3><p class="text-sm text-gray-500 max-w-sm mt-2 leading-relaxed">Your environment is clean. Drag & drop files here or click Add Files to start building your KBIOS project.</p></div><div id="grd" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-8 gap-4"></div><div id="lst" class="hidden flex-col gap-1.5"></div></main></div><div id="edm" class="fixed inset-0 bg-black/40 z-40 hidden flex-col p-2 sm:p-6 backdrop-blur-sm"><div class="bg-white flex-1 rounded-lg shadow-2xl flex flex-col overflow-hidden border border-gray-200"><header class="bg-gray-50 border-b border-gray-200 h-14 px-2 sm:px-4 flex justify-between items-center overflow-x-auto no-scrollbar gap-2 shrink-0"><div class="flex items-center gap-2 shrink-0"><button id="bcl" class="text-gray-500 hover:text-gray-800 transition p-2"><i class="fa-solid fa-arrow-left text-base"></i></button><input type="text" id="efn" class="bg-white border border-gray-300 rounded h-8 px-3 text-xs font-semibold w-40 sm:w-56 focus:outline-none focus:border-blue-500 shrink-0"></div><div class="flex gap-1.5 shrink-0"><button id="bfmt" class="ms-btn-sec hidden" title="Format Code"><i class="fa-solid fa-wand-magic-sparkles"></i><span class="hidden md:inline">Format</span></button><button id="bprv" class="ms-btn-sec text-green-700 hover:bg-green-50 hidden"><i class="fa-solid fa-globe text-sm"></i><span class="hidden sm:inline">Open Web</span></button><button id="bex" class="ms-btn-sec"><i class="fa-solid fa-download"></i><span class="hidden md:inline">Export</span></button><button id="bsv" class="ms-btn"><i class="fa-solid fa-floppy-disk"></i><span class="hidden sm:inline">Save</span></button></div></header><div id="edc" class="flex-1 bg-gray-50 relative overflow-hidden flex items-center justify-center"></div></div></div><div id="pvs" class="fixed inset-0 bg-gray-900/90 z-50 hidden flex-col p-0 sm:p-6 backdrop-blur-md items-center justify-center"><div id="bframe-wrap" class="bg-white rounded-none sm:rounded-xl shadow-2xl flex flex-col overflow-hidden transition-all duration-300 relative w-full h-full"><div id="sim-hdr" class="bg-slate-800 text-white h-12 px-2 flex items-center justify-between border-b border-slate-700 shrink-0 select-none overflow-x-auto no-scrollbar gap-2"><div class="flex items-center gap-1.5 shrink-0"><button onclick="closePrv()" class="w-8 h-8 rounded hover:bg-rose-600 text-slate-300 hover:text-white transition flex items-center justify-center" title="Close Bowser"><i class="fa-solid fa-xmark"></i></button><button onclick="rldPrv()" class="w-8 h-8 rounded hover:bg-slate-700 text-slate-300 hover:text-white transition flex items-center justify-center" title="Refresh"><i class="fa-solid fa-rotate-right text-xs"></i></button></div><div class="flex-1 min-w-[150px] max-w-xl mx-2 bg-slate-900 rounded-md h-8 border border-slate-600 flex items-center px-3 justify-between overflow-hidden shadow-inner shrink-0"><div class="flex items-center gap-2 truncate text-slate-300 text-[11px] w-full"><i class="fa-solid fa-lock text-emerald-400"></i><span id="pvs-url" class="truncate font-mono tracking-wide">https://kbios.app/</span></div><button onclick="navigator.clipboard.writeText(document.getElementById('pvs-url').innerText)" class="text-slate-500 hover:text-white transition p-1"><i class="fa-solid fa-copy text-[10px]"></i></button></div><div class="flex items-center gap-1.5 shrink-0"><span id="vp-dim" class="text-[10px] text-slate-400 font-mono hidden md:inline px-2"></span><div class="flex bg-slate-900 rounded border border-slate-600 p-0.5 text-[11px] items-center"><button onclick="zm(-0.1)" class="px-2.5 py-1 hover:bg-slate-700 rounded text-slate-300"><i class="fa-solid fa-minus"></i></button><span id="zm-txt" class="px-1 font-mono text-emerald-400 w-10 text-center">100%</span><button onclick="zm(0.1)" class="px-2.5 py-1 hover:bg-slate-700 rounded text-slate-300"><i class="fa-solid fa-plus"></i></button></div><button id="pvs-mode-btn" onclick="tglDev()" class="text-slate-400 hover:text-white w-8 h-8 rounded hover:bg-slate-700" title="Toggle Device"><i class="fa-solid fa-mobile-screen"></i></button><button id="pvs-ori-btn" onclick="tglOri()" class="text-slate-400 hover:text-white w-8 h-8 rounded hover:bg-slate-700 hidden" title="Rotate Device"><i class="fa-solid fa-rotate"></i></button><button onclick="tglDrk()" class="text-slate-400 hover:text-white w-8 h-8 rounded hover:bg-slate-700" title="Force Dark Mode"><i class="fa-solid fa-moon"></i></button><div class="relative"><input type="text" id="pvs-src" placeholder="Find..." class="bg-slate-900 border border-slate-600 rounded h-7 text-[11px] px-2.5 pr-6 w-24 focus:outline-none focus:border-blue-500 text-white placeholder-slate-500"><i class="fa-solid fa-magnifying-glass absolute right-2 top-2 text-[10px] text-slate-500"></i></div></div></div><div class="flex-1 bg-slate-100 flex items-center justify-center overflow-auto relative sm:rounded-b-xl"><div id="ifr-wrap" class="w-full h-full transition-all duration-300 origin-center flex items-center justify-center"><div id="ifr-holder" class="w-full h-full bg-white shadow-md relative overflow-hidden transition-all duration-300"></div></div></div></div></div><script>let db=[],cf=null,ed=null,vw='grid',ct='all',zScl=1,dev='app',drk=0,rawH="";const G=document.getElementById("grd"),L=document.getElementById("lst"),M=document.getElementById("edm"),C=document.getElementById("edc"),N=document.getElementById("efn"),T=document.getElementById("tbar"),DZ=document.getElementById("drop-zone"),EV=document.getElementById("empty-view"),cats=[{id:'all',i:'fa-database',l:'All Workspace'},{id:'code',i:'fa-code',l:'Source Code'},{id:'img',i:'fa-images',l:'Graphics/Images'},{id:'media',i:'fa-clapperboard',l:'Audio/Video'},{id:'doc',i:'fa-file-invoice',l:'Documents'}];function init(){let p=0;let iv=setInterval(()=>{p+=Math.random()*20+10;if(p>=100){p=100;clearInterval(iv);setTimeout(()=>T.style.opacity='0',200)}T.style.width=p+'%'},40);localforage.config({driver:localforage.INDEXEDDB,name:'KBIOS_Storage',storeName:'workspace'});loadDB();renderCats();setInterval(autoSv,15000);window.addEventListener('message',e=>{if(e.data&&e.data.type==='kbios-log')Swal.fire({toast:true,position:'bottom-end',text:'Console: '+e.data.msg,timer:3000,showConfirmButton:false,background:'#1e293b',color:'#fff'})})}async function autoSv(){if(ed&&cf){let v=ed.getValue();if(cf.n.endsWith('.json')){try{JSON.parse(v)}catch(e){return}}cf.s=new Blob([v]).size;cf.d="data:text/plain;base64,"+btoa(unescape(encodeURIComponent(v)));await localforage.setItem("nodes",db);updQ()}}async function loadDB(){const d=await localforage.getItem("nodes");if(d)db=d;rd();updQ()}function updQ(){let t=0;db.forEach(x=>t+=x.s);document.getElementById('quota-txt').innerText=(t/(1024*1024)).toFixed(1)+' MB';document.getElementById('quota-bar').style.width=Math.min((t/(20*1024*1024))*100,100)+'%'}async function svDB(){await localforage.setItem("nodes",db);updQ()}function getC(t,n){if(n.endsWith('.pdf'))return 'doc';if(t.startsWith('image/'))return 'img';if(t.startsWith('video/')||t.startsWith('audio/'))return 'media';if(t.startsWith('text/')||n.match(/\.(js|json|html|css|xml|md|py|c|cpp|php)$/))return 'code';return 'all'}function getMime(n){let x=n.split('.').pop().toLowerCase();let m={js:'text/javascript',json:'application/json',html:'text/html',css:'text/css',png:'image/png',jpg:'image/jpeg',svg:'image/svg+xml'};return m[x]||'text/plain'}function sz(b){if(b<1024)return b+' B';let k=b/1024;if(k<1024)return k.toFixed(1)+' KB';return(k/1024).toFixed(1)+' MB'}function ic(c){return c==='doc'?'fa-file-pdf text-rose-500':c==='img'?'fa-image text-indigo-500':c==='media'?'fa-circle-play text-emerald-500':c==='code'?'fa-file-code text-blue-500':'fa-file text-slate-500'}function renderCats(){const n=document.getElementById("nav-cats");n.innerHTML=cats.map(c=>`<button onclick="setCat('${c.id}')" class="w-full flex items-center gap-3 p-2.5 rounded-md transition text-left ${ct===c.id?'bg-blue-600 text-white font-semibold shadow-sm':'text-gray-600 hover:bg-gray-100'}"><i class="fa-solid ${c.i} w-5 text-center text-sm"></i><span class="hidden md:inline text-xs">${c.l}</span></button>`).join('')}function setCat(c){ct=c;renderCats();rd()}function rd(f=db){let arr=f.filter(x=>ct==='all'||getC(x.t,x.n)===ct);let s=document.getElementById("sch").value.toLowerCase();if(s)arr=arr.filter(x=>x.n.toLowerCase().includes(s));G.innerHTML='';L.innerHTML='';if(!arr.length){EV.classList.remove('hidden');EV.classList.add('flex');G.classList.add('hidden');L.classList.add('hidden');return}EV.classList.add('hidden');EV.classList.remove('flex');arr.forEach(x=>{let c=getC(x.t,x.n),si=sz(x.s),i=ic(c);let gCard=`<div class="ms-card p-4 flex flex-col items-center gap-2 group cursor-pointer" onclick="op('${x.id}')"><div class="absolute top-1.5 right-1.5 flex gap-1 opacity-0 group-hover:opacity-100 transition"><button onclick="cln('${x.id}',event)" class="w-6 h-6 bg-blue-50 text-blue-600 rounded flex justify-center items-center hover:bg-blue-100" title="Clone"><i class="fa-solid fa-clone text-[10px]"></i></button><button onclick="del('${x.id}',event)" class="w-6 h-6 bg-rose-50 text-rose-600 rounded flex justify-center items-center hover:bg-rose-100" title="Delete"><i class="fa-solid fa-xmark text-xs"></i></button></div><div class="w-14 h-14 flex justify-center items-center bg-slate-50 rounded-lg group-hover:scale-105 transition"><i class="fa-solid ${i} text-3xl"></i></div><div class="text-xs font-bold text-gray-700 w-full truncate text-center px-1">${x.n}</div><div class="text-[10px] text-gray-400 font-medium">${si}</div></div>`;let lCard=`<div class="ms-card p-2.5 flex items-center justify-between cursor-pointer hover:bg-slate-50" onclick="op('${x.id}')"><div class="flex items-center gap-3 overflow-hidden"><i class="fa-solid ${i} text-base w-6 text-center"></i><span class="text-xs font-bold text-gray-700 truncate">${x.n}</span></div><div class="flex items-center gap-3"><span class="text-[11px] text-gray-400 font-mono">${si}</span><button onclick="cln('${x.id}',event)" class="text-gray-400 hover:text-blue-500 px-1" title="Clone"><i class="fa-solid fa-clone text-xs"></i></button><button onclick="del('${x.id}',event)" class="text-gray-400 hover:text-rose-500 px-1" title="Delete"><i class="fa-solid fa-trash-can text-xs"></i></button></div></div>`;G.innerHTML+=gCard;L.innerHTML+=lCard});if(vw=='grid'){G.classList.remove('hidden');L.classList.add('hidden')}else{L.classList.remove('hidden');G.classList.add('hidden')}}document.getElementById('v-tg').onclick=()=>{vw=vw==='grid'?'list':'grid';document.getElementById('v-tg').innerHTML=vw==='grid'?'<i class="fa-solid fa-table-cells-large"></i>':'<i class="fa-solid fa-list"></i>';rd()};async function addF(fs){T.style.width='50%';T.style.opacity='1';for(let f of fs){if(f.name.endsWith('.zip')){let zip=await JSZip.loadAsync(f);for(let k in zip.files){let ze=zip.files[k];if(!ze.dir){let b64=await ze.async("base64");let t=getMime(ze.name);db.push({id:Date.now().toString()+Math.random(),n:ze.name.split('/').pop(),t:t,s:b64.length,d:"data:"+t+";base64,"+b64})}}}else{let r=new FileReader();await new Promise(res=>{r.onload=e=>{db.push({id:Date.now().toString()+Math.random(),n:f.name,t:f.type,s:f.size,d:e.target.result});res()};r.readAsDataURL(f)})}}await svDB();rd();T.style.width='100%';setTimeout(()=>T.style.opacity='0',300)}document.getElementById("upf").addEventListener("change",e=>{if(e.target.files.length)addF(e.target.files)});document.getElementById("sch").addEventListener("input",()=>rd());['dragenter','dragover'].forEach(e=>window.addEventListener(e,ev=>{ev.preventDefault();DZ.style.display='flex'}));['dragleave','drop'].forEach(e=>window.addEventListener(e,ev=>{ev.preventDefault();DZ.style.display='none'}));window.addEventListener('drop',e=>{if(e.dataTransfer.files.length)addF(e.dataTransfer.files)});async function del(id,e){e.stopPropagation();if((await Swal.fire({title:"Delete item?",icon:"warning",showCancelButton:true,confirmButtonColor:'#e11d48'})).isConfirmed){db=db.filter(x=>x.id!==id);await svDB();rd()}}async function cln(id,e){e.stopPropagation();let target=db.find(x=>x.id===id);if(target){db.push({id:Date.now().toString()+Math.random(),n:'Copy_'+target.n,t:target.t,s:target.s,d:target.d});await svDB();rd()}}document.getElementById('blk-del').onclick=async()=>{if(!db.length)return;if((await Swal.fire({title:"Clear entire workspace?",text:"This operation cannot be reversed.",icon:"danger",showCancelButton:true,confirmButtonColor:'#e11d48'})).isConfirmed){db=[];await svDB();rd()}};function getMod(n){let x=n.split('.').pop().toLowerCase();let m={js:'javascript',json:'javascript',html:'htmlmixed',css:'css',py:'python',xml:'xml'};return m[x]||'javascript'}async function op(id){cf=db.find(x=>x.id===id);N.value=cf.n;M.classList.remove("hidden");M.classList.add("flex");C.innerHTML="";let t=getC(cf.t,cf.n);document.getElementById('bprv').classList.add('hidden');document.getElementById('bfmt').classList.add('hidden');if(t==='img'){C.innerHTML=`<img src="${cf.d}" class="max-w-full max-h-full object-contain shadow-md rounded border">`}else if(t==='media'){let tg=cf.t.startsWith('audio')?'audio':'video';C.innerHTML=`<${tg} src="${cf.d}" controls autoplay class="max-w-full max-h-full shadow-lg rounded ${tg==='audio'?'w-96':''}"></${tg}>`}else if(t==='doc'){C.innerHTML='<canvas id="pc" class="max-w-full max-h-full object-contain shadow-sm"></canvas>';let p=await pdfjsLib.getDocument(cf.d).promise;let pg=await p.getPage(1);let cv=document.getElementById('pc'),cx=cv.getContext('2d'),vp=pg.getViewport({scale:1.5});cv.height=vp.height;cv.width=vp.width;pg.render({canvasContext:c
