ios-logo-container");ldc.style.opacity="1";setTimeout(()=>{const ld=document.getElementById("kbios-loader");ld.style.opacity="0";setTimeout(()=>{ld.style.display="none";const app=document.getElementById("app");const footer=document.getElementById("footer");app.style.opacity="1";app.style.visibility="visible";app.style.transform="translateY(0)";footer.style.opacity="1";footer.style.visibility="visible";document.body.style.overflow="auto";d()},800)},2000)})};const d=()=>{if(typeof tippy!=="undefined")tippy("[data-tippy-content]",{animation:"scale",theme:"light"});if(typeof Lenis!=="undefined"){const lenis=new Lenis({duration:1.2,easing:e=>Math.min(1,1.001-Math.pow(2,-10*e)),smoothWheel:!0,touchMultiplier:2});function raf(time){lenis.raf(time);requestAnimationFrame(raf)}requestAnimationFrame(raf)}if(typeof gsap!=="undefined"&&typeof ScrollTrigger!=="undefined"){gsap.registerPlugin(ScrollTrigger);gsap.to(".hero-bg",{y:"20%",ease:"none",scrollTrigger:{trigger:"#hero",start:"top top",end:"bottom top",scrub:!0}});gsap.from(".hero-content > *",{y:30,opacity:0,duration:1,stagger:.1,ease:"power3.out",delay:.2});gsap.utils.toArray(".section-title").forEach(el=>{gsap.from(el,{scrollTrigger:{trigger:el,start:"top 85%"},y:20,opacity:0,duration:.8,ease:"power3.out"})});gsap.utils.toArray(".grid").forEach(el=>{gsap.from(el.querySelectorAll(".card"),{scrollTrigger:{trigger:el,start:"top 85%"},y:40,opacity:0,duration:1,stagger:.1,ease:"power3.out"})})}};const m=setInterval(()=>{if(window.imagesLoaded&&window.gsap&&window.ScrollTrigger&&window.Lenis){clearInterval(m);l()}},50)});</script></body></html>
